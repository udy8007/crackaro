<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <defs>
    <linearGradient id="boxTop" x1="0" y1="0" x2="200" y2="0">
      <stop offset="0%" stop-color="#be123c"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="boxFace" x1="100" y1="30" x2="100" y2="150">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Box shadow base -->
  <ellipse cx="100" cy="152" rx="72" ry="8" fill="#7f1d1d" opacity="0.15"/>
  <!-- Box body -->
  <rect x="28" y="38" width="144" height="108" rx="8" fill="url(#boxFace)" stroke="#fcd34d" stroke-width="2"/>
  <rect x="28" y="38" width="144" height="22" rx="8" fill="url(#boxTop)"/>
  <rect x="28" y="52" width="144" height="8" fill="url(#boxTop)" opacity="0.6"/>
  <!-- Sparklers -->
  <g opacity="0.95">
    <rect x="52" y="18" width="4" height="52" rx="2" fill="#92400e" transform="rotate(-12 54 44)"/>
    <rect x="72" y="14" width="4" height="56" rx="2" fill="#92400e" transform="rotate(-4 74 42)"/>
    <rect x="92" y="12" width="4" height="58" rx="2" fill="#92400e"/>
    <rect x="112" y="14" width="4" height="56" rx="2" fill="#92400e" transform="rotate(4 114 42)"/>
    <rect x="132" y="18" width="4" height="52" rx="2" fill="#92400e" transform="rotate(12 134 44)"/>
    <!-- Spark tips -->
    <circle cx="50" cy="16" r="4" fill="#fde047" filter="url(#sparkGlow)"/>
    <circle cx="72" cy="12" r="5" fill="#fbbf24" filter="url(#sparkGlow)"/>
    <circle cx="94" cy="10" r="6" fill="#fde047" filter="url(#sparkGlow)"/>
    <circle cx="116" cy="12" r="5" fill="#fbbf24" filter="url(#sparkGlow)"/>
    <circle cx="138" cy="16" r="4" fill="#fde047" filter="url(#sparkGlow)"/>
  </g>
  <!-- Label -->
  <rect x="58" y="72" width="84" height="52" rx="6" fill="#fff" stroke="#fda4af" stroke-width="1.5"/>
  <text x="100" y="94" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#be123c">GOLD SPARKLERS</text>
  <text x="100" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#c2410c">12 inch · Premium</text>
  <g transform="translate(100 118)">
    <circle cx="-14" cy="0" r="3" fill="#eab308"/>
    <circle cx="0" cy="0" r="3" fill="#f97316"/>
    <circle cx="14" cy="0" r="3" fill="#be123c"/>
  </g>
</svg>
