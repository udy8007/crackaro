<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 280" fill="none">
  <defs>
    <linearGradient id="rocketBody" x1="60" y1="40" x2="60" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="45%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <linearGradient id="rocketTip" x1="60" y1="8" x2="60" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="rocketFin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fuse spark -->
  <circle cx="60" cy="18" r="6" fill="#fde047" filter="url(#softGlow)" opacity="0.9"/>
  <path d="M58 24 Q62 30 60 38" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Tip -->
  <path d="M60 42 L44 78 L76 78 Z" fill="url(#rocketTip)"/>
  <!-- Body -->
  <rect x="42" y="78" width="36" height="140" rx="4" fill="url(#rocketBody)"/>
  <!-- Stripes -->
  <rect x="42" y="108" width="36" height="8" fill="#fff" opacity="0.35"/>
  <rect x="42" y="148" width="36" height="8" fill="#7f1d1d" opacity="0.5"/>
  <rect x="42" y="188" width="36" height="8" fill="#fff" opacity="0.35"/>
  <!-- Label -->
  <rect x="48" y="122" width="24" height="52" rx="3" fill="#fff" opacity="0.92"/>
  <text x="60" y="142" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#be123c">SKY</text>
  <text x="60" y="154" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="700" fill="#c2410c">SHOT</text>
  <circle cx="60" cy="166" r="5" fill="#eab308"/>
  <!-- Fins -->
  <path d="M42 210 L22 248 L42 218 Z" fill="url(#rocketFin)"/>
  <path d="M78 210 L98 248 L78 218 Z" fill="url(#rocketFin)"/>
  <!-- Base -->
  <rect x="38" y="216" width="44" height="14" rx="3" fill="#7f1d1d"/>
</svg>
