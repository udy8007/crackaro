<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" fill="none">
  <defs>
    <linearGradient id="giftBox" x1="80" y1="50" x2="80" y2="160">
      <stop offset="0%" stop-color="#be123c"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="160" y2="0">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="50%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <ellipse cx="80" cy="168" rx="52" ry="8" fill="#7f1d1d" opacity="0.14"/>
  <!-- Lid -->
  <rect x="24" y="48" width="112" height="24" rx="4" fill="#c2410c"/>
  <rect x="24" y="48" width="112" height="8" rx="4" fill="#f97316" opacity="0.5"/>
  <!-- Box -->
  <rect x="28" y="68" width="104" height="92" rx="6" fill="url(#giftBox)"/>
  <!-- Ribbon vertical -->
  <rect x="72" y="48" width="16" height="112" fill="url(#ribbon)"/>
  <!-- Ribbon horizontal -->
  <rect x="28" y="108" width="104" height="14" fill="url(#ribbon)"/>
  <!-- Bow -->
  <ellipse cx="58" cy="42" rx="18" ry="12" fill="#fde047" stroke="#eab308" stroke-width="1.5"/>
  <ellipse cx="102" cy="42" rx="18" ry="12" fill="#fde047" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="80" cy="44" r="8" fill="#fbbf24"/>
  <!-- Label -->
  <rect x="44" y="82" width="72" height="36" rx="4" fill="#fff" opacity="0.92"/>
  <text x="80" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#be123c">FESTIVAL</text>
  <text x="80" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#c2410c">GIFT PACK</text>
  <!-- Mini crackers icon -->
  <circle cx="68" cy="122" r="3" fill="#eab308"/>
  <circle cx="80" cy="122" r="3" fill="#f97316"/>
  <circle cx="92" cy="122" r="3" fill="#fde047"/>
</svg>
